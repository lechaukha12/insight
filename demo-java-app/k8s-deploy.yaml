apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-java-app
  namespace: insight-system
  labels:
    app: demo-java-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-java-app
  template:
    metadata:
      labels:
        app: demo-java-app
    spec:
      containers:
        - name: demo-java-app
          image: lechaukha12/demo-java-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          env:
            - name: APP_PORT
              value: "8090"
            # ─── OpenTelemetry Configuration ───
            - name: OTEL_SERVICE_NAME
              value: "demo-java-app"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://insight-otel-agent.insight-system.svc:4318"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=insight,deployment.environment=minikube"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: demo-java-app
  namespace: insight-system
spec:
  selector:
    app: demo-java-app
  ports:
    - port: 8090
      targetPort: 8090
      name: http
