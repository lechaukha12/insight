apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-gateway
  namespace: insight-system
  labels:
    app: demo-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-gateway
  template:
    metadata:
      labels:
        app: demo-gateway
    spec:
      containers:
        - name: demo-gateway
          image: lechaukha12/demo-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8091
          env:
            - name: APP_PORT
              value: "8091"
            - name: JAVA_APP_URL
              value: "http://demo-java-app.insight-system.svc:8090"
            # ─── OpenTelemetry Configuration ───
            - name: OTEL_SERVICE_NAME
              value: "demo-gateway"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://insight-otel-agent.insight-system.svc:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
              value: "true"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=insight,deployment.environment=minikube"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: demo-gateway
  namespace: insight-system
spec:
  selector:
    app: demo-gateway
  ports:
    - port: 8091
      targetPort: 8091
      name: http
