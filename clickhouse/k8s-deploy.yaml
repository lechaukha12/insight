apiVersion: v1
kind: Namespace
metadata:
  name: insight-system
---
# PersistentVolumeClaim for ClickHouse data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-data
  namespace: insight-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# ConfigMap with init schema
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-init
  namespace: insight-system
data:
  init-schema.sql: |
    -- Auto-created from init-schema.sql
    CREATE TABLE IF NOT EXISTS metrics (
        id UInt64,
        agent_id String,
        metric_name String,
        metric_value Float64,
        labels String DEFAULT '{}',
        timestamp DateTime DEFAULT now()
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMMDD(timestamp)
    ORDER BY (agent_id, metric_name, timestamp)
    TTL timestamp + INTERVAL 30 DAY DELETE
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS events (
        id String,
        agent_id String,
        level String,
        title String,
        message String DEFAULT '',
        source String DEFAULT '',
        namespace String DEFAULT '',
        resource String DEFAULT '',
        details String DEFAULT '{}',
        acknowledged UInt8 DEFAULT 0,
        created_at DateTime DEFAULT now()
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMMDD(created_at)
    ORDER BY (agent_id, level, created_at)
    TTL created_at + INTERVAL 30 DAY DELETE
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS logs (
        id UInt64,
        agent_id String,
        namespace String DEFAULT '',
        pod_name String DEFAULT '',
        container String DEFAULT '',
        log_level String DEFAULT 'error',
        message String DEFAULT '',
        timestamp DateTime DEFAULT now()
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMMDD(timestamp)
    ORDER BY (agent_id, log_level, timestamp)
    TTL timestamp + INTERVAL 14 DAY DELETE
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS traces (
        id String,
        agent_id String,
        trace_id String DEFAULT '',
        span_name String DEFAULT '',
        service_name String DEFAULT '',
        duration_ms Float64 DEFAULT 0,
        status String DEFAULT 'ok',
        attributes String DEFAULT '{}',
        timestamp DateTime DEFAULT now()
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMMDD(timestamp)
    ORDER BY (agent_id, service_name, timestamp)
    TTL timestamp + INTERVAL 7 DAY DELETE
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS processes (
        id UInt64,
        agent_id String,
        snapshot String DEFAULT '[]',
        timestamp DateTime DEFAULT now()
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMMDD(timestamp)
    ORDER BY (agent_id, timestamp)
    TTL timestamp + INTERVAL 3 DAY DELETE
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS audit_logs (
        id UInt64,
        user_id String DEFAULT 'system',
        username String DEFAULT 'system',
        action String,
        resource String DEFAULT '',
        details String DEFAULT '{}',
        ip String DEFAULT '',
        timestamp DateTime DEFAULT now()
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMMDD(timestamp)
    ORDER BY (user_id, timestamp)
    TTL timestamp + INTERVAL 90 DAY DELETE
    SETTINGS index_granularity = 8192;
---
# ClickHouse StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: insight-system
  labels:
    app: clickhouse
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          env:
            - name: CLICKHOUSE_DB
              value: insight
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: clickhouse-data
        - name: init-scripts
          configMap:
            name: clickhouse-init
---
# ClickHouse Service
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: insight-system
  labels:
    app: clickhouse
spec:
  selector:
    app: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
  type: ClusterIP
