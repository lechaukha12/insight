# ════════════════════════════════════════════════════════════════════
# Insight Monitoring System — Production Deployment
# Cluster: alfinac-k8s-cluster-1
# Version: v5.1.0 (ClickHouse-only, SQLite removed)
# ════════════════════════════════════════════════════════════════════

# ─── Namespace ───
apiVersion: v1
kind: Namespace
metadata:
  name: insight-system
  labels:
    app.kubernetes.io/name: insight
    app.kubernetes.io/part-of: insight-monitoring
---
# ─── ConfigMap ───
apiVersion: v1
kind: ConfigMap
metadata:
  name: insight-config
  namespace: insight-system
data:
  PORT: "8080"
  CORS_ORIGINS: "*"
  SCAN_INTERVAL: "30"
  REPORT_TIMEZONE: "Asia/Ho_Chi_Minh"
---
# ─── Secrets ───
apiVersion: v1
kind: Secret
metadata:
  name: insight-secrets
  namespace: insight-system
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: "your-bot-token-here"
  TELEGRAM_CHAT_ID: "your-chat-id-here"
  INSIGHT_API_KEY: "insight-secret-key"
  JWT_SECRET: "change-this-to-a-random-64-char-string-for-production"
  ADMIN_PASSWORD: "insight2024"
---
# ─── PVC: ClickHouse data ───
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clickhouse-data
  namespace: insight-system
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
# ─── ClickHouse ConfigMap (init schema) ───
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-init
  namespace: insight-system
data:
  init-schema.sql: |
    -- Config tables (ReplacingMergeTree)
    CREATE TABLE IF NOT EXISTS users (
        id String, username String, password_hash String,
        role String DEFAULT 'admin',
        _version UInt64 DEFAULT toUnixTimestamp(now()),
        _deleted UInt8 DEFAULT 0,
        created_at DateTime DEFAULT now()
    ) ENGINE = ReplacingMergeTree(_version) ORDER BY id;

    CREATE TABLE IF NOT EXISTS clusters (
        id String, name String, description String DEFAULT '',
        status String DEFAULT 'active',
        _version UInt64 DEFAULT toUnixTimestamp(now()),
        _deleted UInt8 DEFAULT 0,
        created_at DateTime DEFAULT now()
    ) ENGINE = ReplacingMergeTree(_version) ORDER BY id;

    CREATE TABLE IF NOT EXISTS agents (
        id String, name String, agent_type String,
        agent_category String DEFAULT 'system',
        hostname String DEFAULT '', cluster_id String DEFAULT 'default',
        status String DEFAULT 'active', labels String DEFAULT '{}',
        token_id String DEFAULT '', agent_version String DEFAULT '',
        os_info String DEFAULT '', ip_address String DEFAULT '',
        last_heartbeat DateTime DEFAULT now(),
        _version UInt64 DEFAULT toUnixTimestamp(now()),
        _deleted UInt8 DEFAULT 0,
        created_at DateTime DEFAULT now()
    ) ENGINE = ReplacingMergeTree(_version) ORDER BY id;

    CREATE TABLE IF NOT EXISTS agent_tokens (
        id String, name String, token String,
        agent_type String DEFAULT 'any',
        cluster_id String DEFAULT 'default',
        created_by String DEFAULT '',
        last_used DateTime DEFAULT now(),
        agent_count UInt32 DEFAULT 0,
        is_active UInt8 DEFAULT 1,
        _version UInt64 DEFAULT toUnixTimestamp(now()),
        _deleted UInt8 DEFAULT 0,
        created_at DateTime DEFAULT now()
    ) ENGINE = ReplacingMergeTree(_version) ORDER BY id;

    CREATE TABLE IF NOT EXISTS alert_configs (
        id String, channel String,
        config String DEFAULT '{}',
        enabled UInt8 DEFAULT 1,
        alert_levels String DEFAULT '["critical","error"]',
        _version UInt64 DEFAULT toUnixTimestamp(now()),
        _deleted UInt8 DEFAULT 0,
        created_at DateTime DEFAULT now()
    ) ENGINE = ReplacingMergeTree(_version) ORDER BY id;

    CREATE TABLE IF NOT EXISTS notification_rules (
        id String, name String, metric_name String,
        operator String DEFAULT '>', threshold Float64,
        duration_minutes UInt32 DEFAULT 5,
        channels String DEFAULT '["telegram"]',
        enabled UInt8 DEFAULT 1,
        _version UInt64 DEFAULT toUnixTimestamp(now()),
        _deleted UInt8 DEFAULT 0,
        created_at DateTime DEFAULT now()
    ) ENGINE = ReplacingMergeTree(_version) ORDER BY id;

    CREATE TABLE IF NOT EXISTS webhooks (
        id String, name String, url String,
        type String DEFAULT 'custom',
        events String DEFAULT '["critical","error"]',
        enabled UInt8 DEFAULT 1,
        _version UInt64 DEFAULT toUnixTimestamp(now()),
        _deleted UInt8 DEFAULT 0,
        created_at DateTime DEFAULT now()
    ) ENGINE = ReplacingMergeTree(_version) ORDER BY id;

    CREATE TABLE IF NOT EXISTS settings (
        key String, value String,
        _version UInt64 DEFAULT toUnixTimestamp(now()),
        _deleted UInt8 DEFAULT 0,
        updated_at DateTime DEFAULT now()
    ) ENGINE = ReplacingMergeTree(_version) ORDER BY key;

    -- Time-series tables (MergeTree with TTL)
    CREATE TABLE IF NOT EXISTS metrics (
        id UInt64, agent_id String, metric_name String,
        metric_value Float64, labels String DEFAULT '{}',
        timestamp DateTime DEFAULT now()
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMMDD(timestamp)
    ORDER BY (agent_id, metric_name, timestamp)
    TTL timestamp + INTERVAL 30 DAY DELETE
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS events (
        id String, agent_id String, level String,
        title String, message String DEFAULT '',
        source String DEFAULT '', namespace String DEFAULT '',
        resource String DEFAULT '', details String DEFAULT '{}',
        acknowledged UInt8 DEFAULT 0,
        created_at DateTime DEFAULT now()
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMMDD(created_at)
    ORDER BY (agent_id, level, created_at)
    TTL created_at + INTERVAL 30 DAY DELETE
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS logs (
        id UInt64, agent_id String,
        namespace String DEFAULT '', pod_name String DEFAULT '',
        container String DEFAULT '', log_level String DEFAULT 'error',
        message String DEFAULT '', timestamp DateTime DEFAULT now()
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMMDD(timestamp)
    ORDER BY (agent_id, log_level, timestamp)
    TTL timestamp + INTERVAL 14 DAY DELETE
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS traces (
        id String, agent_id String,
        trace_id String DEFAULT '', span_name String DEFAULT '',
        service_name String DEFAULT '', duration_ms Float64 DEFAULT 0,
        status String DEFAULT 'ok', attributes String DEFAULT '{}',
        timestamp DateTime DEFAULT now()
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMMDD(timestamp)
    ORDER BY (agent_id, service_name, timestamp)
    TTL timestamp + INTERVAL 7 DAY DELETE
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS processes (
        id UInt64, agent_id String,
        snapshot String DEFAULT '[]',
        timestamp DateTime DEFAULT now()
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMMDD(timestamp)
    ORDER BY (agent_id, timestamp)
    TTL timestamp + INTERVAL 3 DAY DELETE
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS audit_logs (
        id UInt64, user_id String DEFAULT 'system',
        username String DEFAULT 'system', action String,
        resource String DEFAULT '', details String DEFAULT '{}',
        ip String DEFAULT '', timestamp DateTime DEFAULT now()
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMMDD(timestamp)
    ORDER BY (user_id, timestamp)
    TTL timestamp + INTERVAL 90 DAY DELETE
    SETTINGS index_granularity = 8192;

    CREATE TABLE IF NOT EXISTS reports (
        id String, report_type String,
        content String DEFAULT '{}',
        generated_at DateTime DEFAULT now(),
        sent_to String DEFAULT '[]'
    ) ENGINE = MergeTree()
    PARTITION BY toYYYYMMDD(generated_at)
    ORDER BY (report_type, generated_at)
    SETTINGS index_granularity = 8192;

    -- Default data
    INSERT INTO clusters (id, name, description, status, _version, _deleted)
        SELECT 'default', 'Default Cluster', 'Default monitoring cluster', 'active', 1, 0
        WHERE NOT EXISTS (SELECT 1 FROM clusters WHERE id = 'default');
---
# ─── ClickHouse StatefulSet ───
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: insight-system
  labels:
    app: clickhouse
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 9000
              name: native
          env:
            - name: CLICKHOUSE_DB
              value: insight
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: clickhouse-data
        - name: init-scripts
          configMap:
            name: clickhouse-init
---
# ─── ClickHouse Service ───
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: insight-system
spec:
  selector:
    app: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
  type: ClusterIP
---
# ─── API RBAC: ServiceAccount + ClusterRole ───
apiVersion: v1
kind: ServiceAccount
metadata:
  name: insight-api-sa
  namespace: insight-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: insight-api-k8s-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "namespaces", "pods", "services", "configmaps", "secrets",
                "persistentvolumes", "persistentvolumeclaims", "events", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: insight-api-k8s-reader-binding
subjects:
  - kind: ServiceAccount
    name: insight-api-sa
    namespace: insight-system
roleRef:
  kind: ClusterRole
  name: insight-api-k8s-reader
  apiGroup: rbac.authorization.k8s.io
---
# ─── API Gateway Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insight-api
  namespace: insight-system
  labels:
    app: insight-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insight-api
  template:
    metadata:
      labels:
        app: insight-api
    spec:
      serviceAccountName: insight-api-sa
      containers:
        - name: api-gateway
          image: lechaukha12/insight-api:v6.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: insight-config
            - secretRef:
                name: insight-secrets
          env:
            - name: CLICKHOUSE_URL
              value: "http://clickhouse:8123"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
# ─── API Service ───
apiVersion: v1
kind: Service
metadata:
  name: insight-api
  namespace: insight-system
spec:
  selector:
    app: insight-api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
# ─── Data Collector Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insight-collector
  namespace: insight-system
  labels:
    app: insight-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insight-collector
  template:
    metadata:
      labels:
        app: insight-collector
    spec:
      containers:
        - name: data-collector
          image: lechaukha12/insight-collector:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: insight-config
            - secretRef:
                name: insight-secrets
          env:
            - name: CLICKHOUSE_URL
              value: "http://clickhouse:8123"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
# ─── Data Collector Service ───
apiVersion: v1
kind: Service
metadata:
  name: insight-collector
  namespace: insight-system
spec:
  selector:
    app: insight-collector
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
---
# ─── Alert Worker Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insight-worker
  namespace: insight-system
  labels:
    app: insight-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insight-worker
  template:
    metadata:
      labels:
        app: insight-worker
    spec:
      containers:
        - name: alert-worker
          image: lechaukha12/insight-worker:v1.0.0
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: insight-config
            - secretRef:
                name: insight-secrets
          env:
            - name: CLICKHOUSE_URL
              value: "http://clickhouse:8123"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
# ─── Dashboard Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insight-dashboard
  namespace: insight-system
  labels:
    app: insight-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insight-dashboard
  template:
    metadata:
      labels:
        app: insight-dashboard
    spec:
      containers:
        - name: dashboard
          image: lechaukha12/insight-dashboard:v6.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: BACKEND_URL
              value: "http://insight-api:8080"
            - name: NEXT_PUBLIC_API_URL
              value: "http://insight-api:8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
# ─── Dashboard Service ───
apiVersion: v1
kind: Service
metadata:
  name: insight-dashboard
  namespace: insight-system
spec:
  selector:
    app: insight-dashboard
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
