# ─── API Gateway Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insight-api
  namespace: insight-system
  labels:
    app: insight-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insight-api
  template:
    metadata:
      labels:
        app: insight-api
    spec:
      containers:
        - name: api-gateway
          image: lechaukha12/insight-api:v3.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: insight-config
            - secretRef:
                name: insight-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: insight-data
---
apiVersion: v1
kind: Service
metadata:
  name: insight-api
  namespace: insight-system
spec:
  selector:
    app: insight-api
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
# ─── Dashboard Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insight-dashboard
  namespace: insight-system
  labels:
    app: insight-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insight-dashboard
  template:
    metadata:
      labels:
        app: insight-dashboard
    spec:
      containers:
        - name: dashboard
          image: lechaukha12/insight-dashboard:v3.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://insight-api:8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: insight-dashboard
  namespace: insight-system
spec:
  selector:
    app: insight-dashboard
  ports:
    - port: 3000
      targetPort: 3000
  type: NodePort
---
# ─── K8s Agent Deployment ───
apiVersion: apps/v1
kind: Deployment
metadata:
  name: insight-k8s-agent
  namespace: insight-system
  labels:
    app: insight-k8s-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: insight-k8s-agent
  template:
    metadata:
      labels:
        app: insight-k8s-agent
    spec:
      serviceAccountName: insight-k8s-agent
      containers:
        - name: k8s-agent
          image: lechaukha12/insight-k8s-agent:v3.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: INSIGHT_CORE_URL
              value: "http://insight-api:8080"
          envFrom:
            - configMapRef:
                name: insight-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      restartPolicy: Always
